tional-friendly with visa sponsorship, and paid \u2014 though competition is severe and research slots skew toward PhD students, so treat as a reach."}, {"name": "Space Astronomy Summer Program (SASP)", "host": "Space Telescope Science Institute (STScI), Johns Hopkins campus, Baltimore", "country": "USA", "stats_fit": "medium", "stats_fit_note": "Projects are assigned by staff researchers; in practice much SASP work is astronomical data analysis/software on Hubble/JWST data, but explicitly astrostatistics projects are not guaranteed \u2014 the official pages do not enumerate project types.", "kz_eligible": "conditional", "eligibility_note": "FAQ: 'Both U.S. and non-U.S. citizens are welcome to apply... we will assist you in obtaining a work visa if necessary' \u2014 regardless of where the university is located. Caveat: 'primarily open to upper-division undergraduates' (between junior and senior years); 'other candidates may be considered on an individual basis' \u2014 a current 2nd-year fits best for the summer-2028 (or late-2027) cycle.", "funded": "yes", "funding_detail": "$880/week stipend (2026) plus travel and housing assistance.", "deadline": "January 31 (2026 cycle closed; annual ~late January)", "duration": "~9 weeks (Jun 1 \u2013 Jul 31, 2026)", "apply_link": "https://www.stsci.edu/opportunities/space-astronomy-summer-program", "verdict": "backup", "verdict_reason": "Genuinely KZ-eligible with visa assistance and fully funded, but astronomy-domain rather than statistics-core, and the upper-division preference pushes it to a later cycle."}, {"name": "International Student Research Internship Program (ISRIP)", "host": "McKelvey School of Engineering, Washington University in St. Louis", "country": "USA", "stats_fit": "medium", "stats_fit_note": "Lab list varies by year; 2026 list included AI/computational labs (Jha \u2014 AI computational imaging; Vorobeychik \u2014 trustworthy AI/safe control; Python data-processing workflows) alongside biomedical/materials "'Applicants from all around the world are eligible' \u2014 but the undergrad rule for the 2026 cycle is 'undergraduate students who will have been conferred a B.S. degree by August 2027', i.e., effectively final-year students; a 2nd-year graduating ~2028 is ineligible until the 2027 cycle (assuming the window rolls to B.S.-by-Aug-2028). No repeat participants.", "funded": "partial", "funding_detail": "NTD 30,000/month stipend (before tax, foreign students tax-withheld) + only HALF of the cheapest economy round-trip airfare (capped NT$15,000 in shared-location cases); housing not stated.", "deadline": "Dec 15 \u2013 Jan 15 annually (2026 window closed; next: Dec 15, 2026 \u2013 Jan 15, 2027 for summer 2027)", "duration": "2 months (cohorts May\u2013Jun, Jun\u2013Jul, or Jul\u2013Aug)", "apply_link": "https://tigpsip.apps.sinica.edu.tw/index.php", "verdict": "backup", "verdict_reason": "User is ineligible until the 2027 cycle under the graduation-window rule, airfare is only half-covered, and statistics-institute participation in IIP is unverified \u2014 viable later but not a 2026 action item."}, {"name": "OIST Research Internship Program", "host": "Okinawa Institute of Science and Technology", "country": "Japan", "stats_fit": "high", "stats_fit_note": "Applicants apply directly to research units, including the Machine Learning and Data Science Unit (Makoto Yamada \u2014 high-dimensional statistical modeling, kernels, GNNs, optimal transport) and an Information Theory, Probability, and Statistics Unit, within the mathematical/computational sciences area.", "kz_eligible": "conditional", "eligibility_note": "Open to 'those who are currently enrolled in their last two years of a bachelor's degree ... in universities ... in Japan or overseas' with no nationality restrictions \u2014 user enters the final two years (Year 3 of 4) from Sept 2026; currently enrolled students 'must secure approval from their home institution', and 1\u20133 recommendation letters from professorial-level faculty are mandatory before submission.", "funded": "yes", "funding_detail": "JPY 2,400 per working day allowance, OIST-funded furnished housing, one round-trip air ticket, commuting/shuttle pass, and visa (CoE) support.", "deadline": "Twice yearly: Apr 15 (Fall term \u2014 2026 closed) and Oct 15, 2026 for Spring 2027 (Apr\u2013Sep 2027)", "duration": "3\u20136 months within one internship period", "apply_link": "https://www.oist.jp/admissions/research-internship", "verdict": "apply", "verdict_reason": "Fully funded with named ML/statistics units and no nationality bar; the Oct 15, 2026 deadline for Spring 2027 is actionable, though the 3-month minimum must be squeezed into the Jun\u2013Aug KZ summer break (or a leave) plus home-institution approval and professor-level letters."}];
const OVERVIEW = `
<div class="sub-page">
  <h2>Statistics research internships — verified for a KZ-based undergrad</h2>
  <p class="muted">Built 2026-06-11 from a 25-program verification sweep. Target window: <b>Summer 2027</b> (you're a current undergrad on both degrees through 2028; most deadlines fall <b>Dec 2026 &ndash; Feb 2027</b>). The 2026 cycles are closed &mdash; use them to preview requirements, apply in the 2027 cycle.</p>

    <div class="stat"><div class="n amber">9</div><div>BACKUP</div></div>

  </div>

  <h3>The filter used</h3>
  <p>Not "is the field called statistics?" but: <b>(1)</b> does the <i>role</i> involve real statistics/data/ML work, <b>(2)</b> can a <b>Kazakhstan-based</b> undergrad (not US/UK-enrolled) actually apply, <b>(3)</b> is it funded. A statistician's letter &gt; a quant-field researcher's letter &gt; nothing.</p>

  <h3>Strategic call-outs</h3>
  <ul class="callouts">
    <li><b>Best fit + eligible + funded:</b> Aalto AScI, Summer@EPFL, Santa Fe UCR, Allen Institute for AI, KAUST VSRP, Flatiron, OIST &mdash; lead with these.</li>
    <li><b>Warwick Statistics SRE</b> = the <i>best topic fit</i> (a real statistics-department letter), but needs a UK visa (route unverified) + 3rd-year + first-class-track grades.</li>

    <li><b>Weizmann Kupcinet-Getz</b> states a <b>3.6/4 minimum</b> &mdash; above your 3.5; effectively out unless grades rise.</li>
    <li><b>CERN (openlab + main)</b> needs <b>6 semesters / 3 academic years</b> completed by the summer &mdash; you hit that by Summer 2027 (KBTU started 2024), so it's eligible for your target window even though it was "too early" for 2026.</li>
    <li><b>Dead ends:</b> UARE (KBTU is not a designated partner), IPAM RIPS (not eligible from abroad), both DSSGs (US-enrolled only / discontinued).</li>
  </ul>

  <h3>How to use this page</h3>
  <p>Top tabs = tiers + a deadline view. Inside <b>Apply</b> / <b>Backup</b> / <b>Ruled out</b>, the left list is the sub-pages &mdash; click a program for its full detail, or <b>&#9638; All</b> for the table. Tick <b>Applied</b> to track (saved in your browser).</p>
</div>
`;
const tiers = {apply:[],backup:[],skip:[]};
PROGRAMS.forEach(p=>tiers[p.verdict].push(p));
const applied = JSON.parse(localStorage.getItem('reu_applied')||'{}');

const fitB = f=>({high:'b-green',medium:'b-amber',low:'b-gray'}[f]);
const eligB = e=>({yes:'b-green',conditional:'b-amber',no:'b-red',unverified:'b-gray'}[e]);
const fundB = f=>({yes:'b-green',partial:'b-amber',no:'b-red',unverified:'b-gray'}[f]);
const dotC = p=>({apply:'var(--green)',backup:'var(--amber)',skip:'var(--red)'}[p.verdict]);

const TABS=[
  {id:'overview',label:'Overview'},
  {id:'apply',label:'Apply',n:tiers.apply.length},
  {id:'backup',label:'Backup',n:tiers.backup.length},
  {id:'skip',label:'Ruled out',n:tiers.skip.length},
  {id:'deadlines',label:'Deadlines'},
];
let state={tab:'overview',sub:null};

function badges(p){return `
  <span class="badge ${fitB(p.stats_fit)}">fit: ${p.stats_fit}</span>
  <span class="badge ${eligB(p.kz_eligible)}">KZ: ${p.kz_eligible}</span>
  <span class="badge ${fundB(p.funded)}">funded: ${p.funded}</span>`;}

function progCard(p){
  const isApplied=applied[p.name];
  return `<div class="prog">
    <h2>${p.name}</h2>
    <div class="host">${p.host} &middot; ${p.country}</div>
    <div class="badges">${badges(p)}</div>
    <div class="kv"><span class="k">Stats role</span><span>${p.stats_fit_note}</span></div>
    <div class="kv"><span class="k">Eligibility</span><span>${p.eligibility_note}</span></div>
    <div class="kv"><span class="k">Funding</span><span>${p.funding_detail}</span></div>
    <div class="kv"><span class="k">Deadline</span><span>${p.deadline}</span></div>
    <div class="kv"><span class="k">Duration</span><span>${p.duration}</span></div>
    <div class="kv"><span class="k">Verdict</span><span><b class="${p.verdict==='apply'?'green':p.verdict==='backup'?'amber':'red'}">${p.verdict.toUpperCase()}</b> &mdash; ${p.verdict_reason}</span></div>
    <div class="kv"><span class="k">Link</span><a class="link" href="${p.apply_link}" target="_blank">${p.apply_link}</a></div>
    <div class="applied-row"><input type="checkbox" id="ap_${cssId(p.name)}" ${isApplied?'checked':''} onchange="toggleApplied('${jsEsc(p.name)}')"><label for="ap_${cssId(p.name)}">Applied / shortlisted</label></div>
  </div>`;
}
function cssId(s){return s.replace(/[^a-z0-9]/gi,'_').slice(0,40);}
function jsEsc(s){return s.replace(/'/g,"\\'");}
function toggleApplied(n){applied[n]=!applied[n];localStorage.setItem('reu_applied',JSON.stringify(applied));}

function tierTable(list){
  const rows=list.map(p=>`<tr>
    <td class="nm" onclick="go('${state.tab}','${jsEsc(p.name)}')">${p.name}</td>
    <td>${p.country}</td>
    <td><span class="badge ${fitB(p.stats_fit)}">${p.stats_fit}</span></td>
    <td><span class="badge ${eligB(p.kz_eligible)}">${p.kz_eligible}</span></td>
    <td><span class="badge ${fundB(p.funded)}">${p.funded}</span></td>
    <td>${p.deadline.split(';')[0].slice(0,42)}</td></tr>`).join('');
  return `<div class="sub-page"><h2>${ {apply:'Apply tier',backup:'Backup tier',skip:'Ruled out'}[state.tab] } &mdash; all (${list.length})</h2>
    <table class="tbl"><thead><tr><th>Program</th><th>Country</th><th>Fit</th><th>KZ</th><th>Funded</th><th>Deadline</th></tr></thead><tbody>${rows}</tbody></table>
    <p class="muted" style="margin-top:12px">Click a program name for full detail.</p></div>`;
}

const MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function dlMonth(s){s=s.toLowerCase();for(const m in MONTHS){if(s.includes(m))return MONTHS[m];}if(s.includes('rolling'))return 0;return 99;}
function deadlinesView(){
  const list=[...tiers.apply,...tiers.backup].sort((a,b)=>dlMonth(a.deadline)-dlMonth(b.deadline));
  const roll=list.filter(p=>dlMonth(p.deadline)===0);
  const dated=list.filter(p=>dlMonth(p.deadline)>0&&dlMonth(p.deadline)<99);
  const unk=list.filter(p=>dlMonth(p.deadline)===99);
  const item=p=>`<div class="dl-item ${applied[p.name]?'done':''}"><span><span class="badge ${p.verdict==='apply'?'b-green':'b-amber'}">${p.verdict}</span> ${p.name}</span><span class="when">${p.deadline.split(';')[0].slice(0,48)}</span></div>`;
  return `<div class="sub-page"><h2>Deadlines &mdash; apply &amp; backup tiers</h2>
   <p class="muted">Most are annual; 2026 cycles closed. Apply in the matching <b>2027 cycle</b> (deadlines roughly Dec 2026 &ndash; Feb 2027) for a Summer-2027 placement.</p>
   ${roll.length?`<div class="dl-group"><h3>Rolling / year-round</h3>${roll.map(item).join('')}</div>`:''}
   <div class="dl-group"><h3>By month (annual cycle)</h3>${dated.map(item).join('')}</div>
   ${unk.length?`<div class="dl-group"><h3>Date unconfirmed</h3>${unk.map(item).join('')}</div>`:''}
  </div>`;
}

function go(tab,sub){state={tab,sub:sub||null};render();}
function render(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="${state.tab===t.id?'on':''}" onclick="go('${t.id}')">${t.label}${t.n!=null?`<span class="count">${t.n}</span>`:''}</button>`).join('');
  const sn=document.getElementById('subnav'), ct=document.getElementById('content');
  if(state.tab==='overview'){sn.style.display='none';ct.innerHTML=OVERVIEW;return;}
  if(state.tab==='deadlines'){sn.style.display='none';ct.innerHTML=deadlinesView();return;}
  sn.style.display='block';
  const list=tiers[state.tab];
  sn.innerHTML=`<button class="${!state.sub?'on':''}" onclick="go('${state.tab}')"><span class="dot" style="background:var(--accent)"></span>&#9638; All (${list.length})</button>`+
    list.map(p=>`<button class="${state.sub===p.name?'on':''}" onclick="go('${state.tab}','${jsEsc(p.name)}')"><span class="dot" style="background:${dotC(p)}"></span>${p.name}</button>`).join('');
  if(!state.sub){ct.innerHTML=tierTable(list);}
  else{const p=list.find(x=>x.name===state.sub);ct.innerHTML=`<div class="sub-page">${progCard(p)}</div>`;}
}
render();
</script>
